name: Android APK Build & Auto Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Inject Dynamic Version into App
        run: |
          NEW_VERSION="1.0.${{ github.run_number }}"
          echo "Setting App Version to: $NEW_VERSION"
          
          # Inject version into index.html
          node -e "
            const fs = require('fs');
            let html = fs.readFileSync('www/index.html', 'utf8');
            html = html.replace(/const APP_VERSION = .*/g, \"const APP_VERSION = '$NEW_VERSION';\");
            fs.writeFileSync('www/index.html', html);
          "
          
          # Create version.json
          cat << JSON > version.json
          {
            "version": "$NEW_VERSION",
            "url": "https://github.com/S-Matrix-Ltd/Monthly-Duty-Payout-Summary/releases"
          }
          JSON

      - name: Install dependencies
        run: npm ci

      - name: Install Capacitor Assets Tool
        run: npm install @capacitor/assets --save-dev

      - name: Generate App Icons and Splash Screen
        run: |
          mkdir -p assets
          cp icon-512.png assets/icon-only.png || true
          cp icon-512.png assets/icon-foreground.png || true
          cp icon-512.png assets/icon-background.png || true
          npx capacitor-assets generate --android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Create Automatic Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          body: |
            Automated Build & Release
            Version: v1.0.${{ github.run_number }}
          files: |
            android/app/build/outputs/apk/debug/app-debug.apk
            version.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
